name: Build and Release Windows Executable

on:
  push:
    tags:
      - 'v*' # Trigger on version tags
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # Use stable Python version
        cache: 'pip' # caching pip dependencies

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build Executable
      run: |
        pyinstaller --noconfirm --onedir --windowed --name "AliceSW-Reader" "main.py"

    - name: Zip Release
      run: |
        Compress-Archive -Path dist/AliceSW-Reader -DestinationPath AliceSW-Reader-Windows.zip

    - name: Create Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: AliceSW-Reader-Windows.zip
        generate_release_notes: true
